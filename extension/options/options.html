<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Keycloak Logout</title>
  <style>
    :root {
      --accent: #3f5c8c;
      --ink: #1a1d22;
      --muted: #6b7280;
      --hair: #e2e4e8;
      --bg: #f4f5f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    .panel {
      width: 100%;
      background: #fff;
      border: 1px solid var(--hair);
      border-radius: 14px;
      padding: 20px;
    }
    .head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .head img { width: 40px; height: 40px; }
    .head h1 { margin: 0; font-size: 1.15rem; font-weight: 700; }
    .sub { margin: 0 0 22px; font-size: .82rem; color: var(--muted); }

    label { display: block; margin: 16px 0 6px; font-size: .82rem; font-weight: 600; }
    .hint { font-size: .74rem; color: var(--muted); margin: 4px 0 0; }
    input[type="text"] {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      font-size: .92rem;
      border: 1px solid var(--hair);
      border-radius: 10px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(63,92,140,.14); }
    input[type="text"].error { border-color: #e5484d; box-shadow: 0 0 0 3px rgba(229, 72, 77, .18); }
    .err { font-size: .74rem; color: #e5484d; margin: 4px 0 0; display: none; }
    .err.show { display: block; }

    .row-check { display: flex; align-items: center; gap: 10px; margin-top: 20px; }
    .row-check input { width: 16px; height: 16px; accent-color: var(--accent); }
    .row-check label { margin: 0; font-weight: 500; }

    .actions { display: flex; align-items: center; gap: 14px; margin-top: 24px; }
    button {
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      font-size: .92rem;
      font-weight: 600;
      padding: 10px 22px;
      min-width: 116px;
      border-radius: 10px;
      transition: background .25s ease;
    }
    button:hover { background: #4d6fa6; }
    button.ok, button.ok:hover { background: #1f9d57; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="head">
      <img src="../icons/icon-128.png" alt="">
      <h1>Keycloak Logout</h1>
    </div>
    <p class="sub">Keycloak (SSO) logout settings</p>

    <label for="host">Host</label>
    <input type="text" id="host" placeholder="auth.example.com" spellcheck="false">
    <p class="err" id="host-err">Required</p>
    <p class="hint">No https:// or slashes.</p>

    <label for="realm">Realm</label>
    <input type="text" id="realm" placeholder="master" spellcheck="false">
    <p class="err" id="realm-err">Required</p>

    <div class="row-check">
      <input type="checkbox" id="notify">
      <label for="notify">Notification after logout</label>
    </div>

    <div class="actions">
      <button id="save" type="button">Save</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
